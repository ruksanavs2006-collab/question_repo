<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <span class="site-title">Dept. of Computer Applications</span>
            <nav><a href="/">Back to Site</a></nav>
        </div>
    </header>

    <section class="admin-section">
        <h2>Admin Login</h2>
        <form class="admin-form">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit" class="btn-gold">Login</button>
        </form>
        <p class="admin-note">Upload functionality will be connected in a later step.</p>
    </section>
</body>
</html>
